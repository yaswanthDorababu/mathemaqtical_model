<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math3D | Laws & Theorems Reference</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="p-8 min-h-screen">
    <!-- Progress Header -->
    <div class="max-w-4xl mx-auto mb-12 flex justify-between items-end border-b border-slate-800 pb-6">
        <div>
            <p class="text-blue-500 font-bold text-xs uppercase tracking-widest mb-1">EAMCET Preparation</p>
            <h1 class="text-4xl font-bold">Chapter-wise Formula Sheets</h1>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 uppercase">Daily Streak</p>
            <p class="text-xl font-bold text-orange-400">🔥 7 Days</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <a href="mathemathics.html" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                Back to Visualizer
            </a>
            <a href="query_generator.html" class="ml-4 px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold transition-all border border-white/10">
                AI Query Lab
            </a>
        </div>

        <!-- New Tabs for Organization -->
        <div class="flex gap-4 mb-8 border-b border-slate-800 pb-px">
            <button onclick="renderReference('theorem')" id="tab-theorem" class="tab-btn px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-white">THEOREMS & LAWS</button>
            <button onclick="renderReference('shape')" id="tab-shape" class="tab-btn px-4 py-2 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-white">GEOMETRIC SHAPES</button>
        </div>

        <div class="grid gap-6" id="laws-grid">
            <!-- Content will be dynamically inserted here -->
        </div>
    </div>

    <script>
        const MATH_DATA = {
            calculus_limits: {
                type: "theorem",
                title: "Limits & Continuity",
                formula: "L = \\lim_{x \\to a} f(x)",
                desc: "Crucial for EAMCET. Remember L'Hospital's Rule: if 0/0 or ∞/∞, take derivatives of numerator and denominator."
            },
            trig_identities: {
                type: "theorem",
                title: "Trigonometric Identities",
                formula: "\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B",
                desc: "Essential for solving complex integration problems and triangle properties."
            },
            pythagoras: {
                type: "theorem",
                title: "Pythagorean Theorem",
                formula: "a² + b² = c²",
                desc: "Behold the geometric proof where the areas of the two smaller squares perfectly equal the area of the square on the hypotenuse."
            },
            archimedes: {
                type: "theorem",
                title: "Archimedes' Principle",
                formula: "V_{sphere} = \\frac{2}{3} V_{cylinder}",
                desc: "Demonstrating the ratio relationship between a sphere and its circumscribed cylinder."
            },
            torus: {
                type: "shape",
                title: "Surface of a Torus",
                formula: "x = (R + r cos θ) cos φ, y = (R + r cos θ) sin φ, z = r sin θ",
                desc: "A torus is a surface of revolution generated by revolving a circle in three-dimensional space about an axis coplanar with the circle."
            },
            sphere: {
                type: "shape",
                title: "Spherical Coordinates",
                formula: "x = r sin θ cos φ, y = r sin θ sin φ, z = r cos θ",
                desc: "Calculating the volume of a sphere is simplified by using triple integrals in spherical coordinates rather than Cartesian."
            },
            wave: {
                type: "shape",
                title: "3D Sine Wave Surface",
                formula: "z = sin(√(x² + y²))",
                desc: "Visualizing harmonic functions and the relationship between distance from the origin and periodic oscillation."
            },
            circle: {
                type: "shape",
                title: "Circle",
                formula: "A = \\pi r^2",
                desc: "A set of all points in a plane that are at a given distance from a center point."
            },
            rectangle: {
                type: "shape",
                title: "Rectangle",
                formula: "Area = w \\times h",
                desc: "A simple quadrilateral with four right angles and opposite sides of equal length."
            },
            rhombus: {
                type: "shape",
                title: "Rhombus",
                formula: "Area = \\frac{1}{2} d_1 d_2",
                desc: "A quadrilateral with all four sides of equal length, named for its diamond shape."
            },
            parallelogram: {
                type: "shape",
                title: "Parallelogram",
                formula: "Area = b \\times h",
                desc: "A quadrilateral with two pairs of parallel sides."
            },
            trapezoid: {
                type: "shape",
                title: "Trapezoid",
                formula: "Area = \\frac{a+b}{2}h",
                desc: "A quadrilateral with at least one pair of parallel sides."
            },
            line: {
                type: "shape",
                title: "Line Segment",
                formula: "L = \\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}",
                desc: "The shortest distance between two points in Euclidean space."
            },
            spiral: {
                type: "shape",
                title: "Archimedean Spiral",
                formula: "r = a + b\\theta",
                desc: "A curve where the distance from the origin is proportional to the angle of rotation."
            },
            polygon: {
                type: "shape",
                title: "Regular Polygon",
                formula: "Area = \\frac{1}{2} n s r",
                desc: "A 2D shape with n equal sides and equal interior angles."
            },
            ellipse: {
                type: "shape",
                title: "Ellipse",
                formula: "\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1",
                desc: "A plane curve surrounding two focal points such that the sum of distances to the foci is constant."
            },
            heart: {
                type: "shape",
                title: "Heart Curve",
                formula: "r = a(1 - \\sin\\theta)",
                desc: "Also known as a cardioid, representing a specific heart-like mathematical path."
            },
            cube: {
                type: "shape",
                title: "Hexahedron (Cube)",
                formula: "V = s^3",
                desc: "A 3D regular solid with six congruent square faces."
            },
            cylinder: {
                type: "shape",
                title: "Cylinder",
                formula: "V = \\pi r^2 h",
                desc: "A curvilinear geometric shape with two parallel circular bases."
            },
            cone: {
                type: "shape",
                title: "Cone",
                formula: "V = \\frac{1}{3}\\pi r^2 h",
                desc: "A 3D shape that tapers from a flat circular base to a point."
            },
            pyramid: {
                type: "shape",
                title: "Square Pyramid",
                formula: "V = \\frac{1}{3}bh",
                desc: "A polyhedron formed by connecting a square base and an apex."
            },
            platonic: {
                type: "shape",
                title: "Platonic Solids",
                formula: "V - E + F = 2",
                desc: "Regular, convex polyhedra with identical faces made of congruent regular polygons."
            },
            tesseract: {
                type: "shape",
                title: "4D Tesseract",
                formula: "x^2 + y^2 + z^2 + w^2 = r^2",
                desc: "The 4D analog of a cube, projected into 3D visual space."
            }
        };

        function renderReference(filterType) {
            const grid = document.getElementById('laws-grid');
            grid.innerHTML = '';

            // Update Tab UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-blue-500', 'text-white');
                btn.classList.add('border-transparent', 'text-slate-500');
            });
            const activeTab = document.getElementById(`tab-${filterType}`);
            activeTab.classList.add('border-blue-500', 'text-white');
            activeTab.classList.remove('border-transparent', 'text-slate-500');

            Object.values(MATH_DATA).forEach(item => {
                if (item.type !== filterType) return;

                const card = document.createElement('div');
                card.className = "glass p-8 rounded-3xl border border-white/10";
                card.innerHTML = `
                    <h2 class="text-2xl font-bold mb-4 text-blue-400 italic">${item.title}</h2>
                    <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 mb-4 font-mono text-emerald-400 text-sm overflow-x-auto">
                        ${item.formula}
                    </div>
                    <p class="text-slate-400 text-sm leading-relaxed">${item.desc}</p>
                `;
                grid.appendChild(card);
            });
        }

        // Initial render
        renderReference('theorem');
    </script>
</body>
</html>
